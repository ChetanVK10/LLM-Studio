# QLoRA Fine-tuning Configuration for Qwen2.5-3B-Instruct

model:
  base_model_name: "Qwen/Qwen2.5-3B-Instruct"
  quantization: "4bit"           # Supported: "4bit", "8bit", "none"
  device_map: "auto"
  trust_remote_code: true

dataset:
  raw_path: "data/raw/sample_dataset.csv"
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  test_split_ratio: 0.2
  random_seed: 42
  system_prompt: "You are a helpful assistant."
  columns:
    instruction: "instruction"
    input: "input"
    output: "output"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

training:
  output_dir: "artifacts/checkpoints"
  experiments_dir: "artifacts/experiments"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "epoch"
  evaluation_strategy: "epoch"
  fp16: true
  bf16: false
  max_seq_length: 1024
  report_to: "none"

evaluation:
  metrics_report_path: "artifacts/evaluation/metrics.json"
  predictions_csv_path: "artifacts/evaluation/sample_predictions.csv"
  loss_curve_path: "artifacts/evaluation/loss_curve.png"
  rouge_scores_path: "artifacts/evaluation/rouge_scores.png"
  max_new_tokens: 256
  temperature: 0.1

export:
  adapter_name: "qwen-support-v1"
  adapters_dir: "models/adapters"
  merged_dir: "models/merged"
  registry_path: "models/registry.json"
