dataset:
  columns:
    input: input
    instruction: instruction
    output: output
  random_seed: 42
  raw_path: data/raw/sample_dataset.csv
  test_split_ratio: 0.2
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl
evaluation:
  loss_curve_path: artifacts/evaluation/loss_curve.png
  max_new_tokens: 256
  metrics_report_path: artifacts/evaluation/metrics.json
  predictions_csv_path: artifacts/evaluation/sample_predictions.csv
  rouge_scores_path: artifacts/evaluation/rouge_scores.png
  temperature: 0.1
export:
  adapter_name: qwen-support-v1
  adapters_dir: models/adapters
  merged_dir: models/merged
  registry_path: models/registry.json
lora:
  bias: none
  lora_alpha: 32
  lora_dropout: 0.05
  r: 16
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  task_type: CAUSAL_LM
model:
  base_model_name: Qwen/Qwen2.5-3B-Instruct
  device_map: auto
  quantization: 4bit
  trust_remote_code: true
training:
  bf16: false
  evaluation_strategy: epoch
  experiments_dir: artifacts/experiments
  fp16: true
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  logging_steps: 10
  lr_scheduler_type: cosine
  max_seq_length: 1024
  num_train_epochs: 3
  output_dir: artifacts/checkpoints
  per_device_eval_batch_size: 2
  per_device_train_batch_size: 2
  report_to: none
  save_strategy: epoch
  warmup_ratio: 0.03
  weight_decay: 0.01
